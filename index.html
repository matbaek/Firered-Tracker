<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FireRed Ultimate Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
body { font-family: Arial; background:#111; color:#eee; padding:15px; }
h1 { text-align:center; }
.tabs { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.tab { padding:8px 12px; background:#333; border-radius:8px; cursor:pointer; }
.active { background:#4caf50; }
.section { background:#1e1e1e; padding:12px; margin-bottom:12px; border-radius:10px; }
.grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(160px,1fr)); gap:6px; }
.summary { background:#222; padding:10px; border-radius:10px; margin-bottom:10px; }
input[type="text"] { width:100%; padding:8px; margin-bottom:10px; border-radius:8px; border:none; }
.small { font-size:12px; opacity:0.7; }
</style>
</head>
<body>

<h1>FireRed Ultimate Tracker</h1>

<div class="tabs">
  <div class="tab active" onclick="setTab('game', this)">🎮 Game</div>
  <div class="tab" onclick="setTab('kanto', this)">📘 Kanto</div>
  <div class="tab" onclick="setTab('johto', this)">🟢 Johto</div>
  <div class="tab" onclick="setTab('hoenn', this)">🔵 Hoenn</div>
</div>

<div class="summary">
  <div>🎮 Game Progress: <span id="gameProgress">0</span>%</div>
  <div>📘 Dex Progress: <span id="dexProgress">0</span>%</div>
</div>

<input type="text" id="search" placeholder="🔍 Search..." oninput="filter()">

<div id="app"></div>

<script>
let currentTab = "game";

// --- FULL POKEMON NAMES (GEN 1-3) ---
const names = {};
const nameList = [
"Bulbasaur","Ivysaur","Venusaur","Charmander","Charmeleon","Charizard","Squirtle","Wartortle","Blastoise",
"Caterpie","Metapod","Butterfree","Weedle","Kakuna","Beedrill","Pidgey","Pidgeotto","Pidgeot","Rattata","Raticate",
"Spearow","Fearow","Ekans","Arbok","Pikachu","Raichu","Sandshrew","Sandslash","Nidoran♀","Nidorina","Nidoqueen",
"Nidoran♂","Nidorino","Nidoking","Clefairy","Clefable","Vulpix","Ninetales","Jigglypuff","Wigglytuff","Zubat","Golbat",
"Oddish","Gloom","Vileplume","Paras","Parasect","Venonat","Venomoth","Diglett","Dugtrio","Meowth","Persian",
"Psyduck","Golduck","Mankey","Primeape","Growlithe","Arcanine","Poliwag","Poliwhirl","Poliwrath","Abra","Kadabra","Alakazam",
"Machop","Machoke","Machamp","Bellsprout","Weepinbell","Victreebel","Tentacool","Tentacruel","Geodude","Graveler","Golem",
"Ponyta","Rapidash","Slowpoke","Slowbro","Magnemite","Magneton","Farfetch'd","Doduo","Dodrio","Seel","Dewgong","Grimer","Muk",
"Shellder","Cloyster","Gastly","Haunter","Gengar","Onix","Drowzee","Hypno","Krabby","Kingler","Voltorb","Electrode",
"Exeggcute","Exeggutor","Cubone","Marowak","Hitmonlee","Hitmonchan","Lickitung","Koffing","Weezing","Rhyhorn","Rhydon",
"Chansey","Tangela","Kangaskhan","Horsea","Seadra","Goldeen","Seaking","Staryu","Starmie","Mr. Mime","Scyther","Jynx",
"Electabuzz","Magmar","Pinsir","Tauros","Magikarp","Gyarados","Lapras","Ditto","Eevee","Vaporeon","Jolteon","Flareon",
"Porygon","Omanyte","Omastar","Kabuto","Kabutops","Aerodactyl","Snorlax","Articuno","Zapdos","Moltres","Dratini","Dragonair","Dragonite","Mewtwo","Mew"
];
nameList.forEach((n,i)=>names[i+1]=n);

// --- TAGS ---
const tradeOnly = new Set([37,69,79,120,127]);
const tradeEvo = new Set([65,68,94,76]);
const eventOnly = new Set([151,251,386]);

function tag(n){
  if(eventOnly.has(n)) return " 🎟️";
  if(tradeEvo.has(n)) return " 🔁";
  if(tradeOnly.has(n)) return " 🔄";
  return "";
}

// --- GAME SECTIONS ---
const gameSections = [
  {name:"Main Story", items:["Brock","Misty","Lieutenant Surge","Erika","Koga","Sabrina","Blaine","Giovanni","Elite Four","Champion"]},
  {name:"Sevii Islands", items:["One Island","Two Island","Three Island","Four Island","Five Island","Six Island","Seven Island","Ruby","Sapphire"]},
  {name:"Legendaries", items:["Mewtwo","Articuno","Zapdos","Moltres","Raikou / Entei / Suicune"]},
  {name:"Elite Four Rematch", items:["Rematch"]}
];

// --- DEX BY GAME ---
const dexGroups = {
  kanto:[
    {name:"FireRed (Catchable)", list: Array.from({length:151},(_,i)=>i+1).filter(n=>!tradeOnly.has(n))},
    {name:"LeafGreen (Required Trades)", list: Array.from(tradeOnly)},
    {name:"Trade Evolutions", list: Array.from(tradeEvo)}
  ],
  johto:[
    {name:"Pokémon Emerald (Johto Pokémon)", list: Array.from({length:100},(_,i)=>i+152)}
  ],
  hoenn:[
    {name:"Ruby / Sapphire / Emerald", list: Array.from({length:135},(_,i)=>i+252)}
  ]
};

function setTab(tab, el){
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  render();
}

function save(id,val){ localStorage.setItem(id,val); }
function load(id){ return localStorage.getItem(id)==="true"; }

function render(){
  const app = document.getElementById("app");
  app.innerHTML="";

  if(currentTab === "game"){
    gameSections.forEach((s,i)=>{
      const div=document.createElement("div"); div.className="section";
      div.innerHTML=`<h3>${s.name}</h3>`;
      const grid=document.createElement("div"); grid.className="grid";

      s.items.forEach((item,j)=>{
        const id=`g-${i}-${j}`;
        const label=document.createElement("label");
        const cb=document.createElement("input");
        cb.type="checkbox"; cb.checked=load(id);
        cb.onchange=()=>{save(id,cb.checked); update();};
        label.appendChild(cb);
        label.append(" "+item);
        grid.appendChild(label);
      });

      div.appendChild(grid);
      app.appendChild(div);
    });

  } else {
    dexGroups[currentTab].forEach(group=>{
      const div=document.createElement("div"); div.className="section";
      div.innerHTML=`<h3>${group.name}</h3>`;
      const grid=document.createElement("div"); grid.className="grid";

      group.list.forEach(n=>{
        const id=`dex-${n}`;
        const label=document.createElement("label");
        const cb=document.createElement("input");
        cb.type="checkbox"; cb.checked=load(id);
        cb.onchange=()=>{save(id,cb.checked); update();};

        label.appendChild(cb);
        label.append(` #${n} ${names[n]||""}${tag(n)}`);
        grid.appendChild(label);
      });

      div.appendChild(grid);
      app.appendChild(div);
    });
  }

  update();
}

function update(){
  let gameTotal=0, gameChecked=0;
  document.querySelectorAll("[id^='app'] input").forEach(cb=>{
    if(cb.id?.startsWith("g-")){
      gameTotal++;
      if(cb.checked) gameChecked++;
    }
  });

  let dexTotal=386, dexChecked=0;
  for(let i=1;i<=386;i++){
    if(load(`dex-${i}`)) dexChecked++;
  }

  document.getElementById("gameProgress").innerText = gameTotal?Math.floor(gameChecked/gameTotal*100):0;
  document.getElementById("dexProgress").innerText = Math.floor(dexChecked/dexTotal*100);
}

function filter(){
  const q=document.getElementById("search").value.toLowerCase();
  document.querySelectorAll("label").forEach(l=>{
    l.style.display=l.innerText.toLowerCase().includes(q)?"block":"none";
  });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

render();
</script>

</body>
</html>
